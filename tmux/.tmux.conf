
# ---------------------------------------------------
# GENERAL SETTINGS
# ---------------------------------------------------
# Enable mouse support (allows resizing panes and selecting text)
set -g mouse on

# Neovim: ESC sin lag (escape-time bajo) y autoread funcional (focus-events).
# Recomendado por :checkhealth de Neovim.
set -sg escape-time 10
set -g focus-events on

# ---------------------------------------------------
# TERMINAL & IMAGE PASSTHROUGH (image.nvim / molten-nvim)
# ---------------------------------------------------
# Allow Kitty Graphics Protocol passthrough so image.nvim can render PNGs in
# ghostty while running inside tmux.
set -g allow-passthrough on
set -ga update-environment 'TERM TERM_PROGRAM'

# Truecolor support
# NOTA: usamos screen-256color (no tmux-256color) porque la UI dinamica de
# ngrok no entiende el terminfo tmux-256color y cae a un modo "solaris" sin
# interfaz. Con screen-256color, ngrok renderiza su dashboard correctamente.
# Los overrides de abajo recuperan truecolor, italics y undercurl para nvim.
set -g default-terminal "screen-256color"
set -ga terminal-overrides ',*:Tc'                       # truecolor (24-bit)
set -as terminal-features ',*:RGB'                        # truecolor moderno (lo que detectan apps como Claude Code/Ink)
set -ga terminal-overrides ',*:sitm=\E[3m:ritm=\E[23m'   # italics
set -ga terminal-overrides ',*:Smulx=\E[4::%p1%dm'        # undercurl
set -ga terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m' # color del undercurl

# ---------------------------------------------------
# VIM-STYLE PANE NAVIGATION
# ---------------------------------------------------
# Use h, j, k, l to move between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---------------------------------------------------
# PANE RESIZING
# ---------------------------------------------------
# Resize panes using PREFIX + H/J/K/L (Vim style)
# The '-r' flag allows you to hold the key to repeat
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---------------------------------------------------
# COPY MODE
# ---------------------------------------------------
# Use Vim keybindings in copy mode
setw -g mode-keys vi

# Setup 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Smoother mouse wheel scroll: 2 lines per tick instead of the default 5
bind-key -T copy-mode-vi WheelUpPane   send-keys -X -N 2 scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X -N 2 scroll-down

# ---------------------------------------------------
# CATPPUCCIN MOCHA THEME COLORS
# ---------------------------------------------------
# Base colors
set -g @thm_bg "#1e1e2e"
set -g @thm_fg "#cdd6f4"
set -g @thm_overlay_0 "#6c7086"
set -g @thm_white "#bac2de"

# Accents
set -g @thm_red "#f38ba8"
set -g @thm_green "#a6e3a1"
set -g @thm_yellow "#f9e2af"
set -g @thm_blue "#89b4fa"
set -g @thm_magenta "#cba6f7"
set -g @thm_cyan "#94e2d5"

# Logical mappings (Catppuccin Mocha palette)
set -g @thm_peach "#fab387"
set -g @thm_maroon "#eba0ac"
set -g @thm_mauve "#cba6f7"
set -g @thm_pink "#f5c2e7"
set -g @thm_rosewater "#f5e0dc"

# ---------------------------------------------------
# PLUGINS
# ---------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-online-status'

# Configure Online
set -g @online_icon "ok"
set -g @offline_icon "nok"


# ---------------------------------------------------
# STATUS BAR & VISUALS
# ---------------------------------------------------
# Configure Tmux Status Bar Positioning
set -g status-position top
set -g status-style "bg=default"
set -g status-justify "left"

# Pane Border Look and Feel
setw -g pane-border-status top
setw -g pane-border-format ""

# Active Pane: Highlighted with Mocha yellow
setw -g pane-active-border-style "bg=default,fg=#{@thm_yellow}"

# Inactive Pane: Set fg to default/bg to make lines 'transparent'
setw -g pane-border-style "bg=default,fg=default"

setw -g pane-border-lines single

# Window Look and Feel
set -wg automatic-rename on
set -g automatic-rename-format "Window"

# --- FIXED SECTION START ---
# We force specific colors inside the format strings.

# @claude_done: flag de notificacion "Claude terminó" puesto por el hook Stop
# (~/.claude/hooks/tmux-claude-done.sh). Muestra un icono de exclamación en la
# ventana de fondo donde Claude acabó; se borra solo al seleccionarla (ver el
# hook after-select-window más abajo).

# Inactive Window: Uses 'overlay_0' (Dark Grey) to appear dimmed
# (la coma de #[fg=...#,bold] va escapada con #, para no romper el #{?...})
set -g window-status-format "#[bg=default,fg=#{@thm_overlay_0}] #I#{?#{!=:#{window_name},Window},: #W,}#{?#{@claude_done}, #[fg=#{@thm_red}#,bold]  ,} "

# Active Window: Uses 'yellow' and bold to stand out
set -g window-status-current-format "#[bg=default,fg=#{@thm_yellow},bold] #I#{?#{!=:#{window_name},Window},: #W,}#{?#{@claude_done}, #[fg=#{@thm_red}#,bold]  ,} "

# Reset global styles to avoid conflicts
set -g window-status-style "bg=default,fg=default"
set -g window-status-current-style "bg=default,fg=default"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=default,fg=#{@thm_overlay_0}]│"
# --- FIXED SECTION END ---

# Status Left Look and Feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#[bg=default,fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=default,fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=default,fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# Status Right Look and Feel
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=default,fg=#{@thm_green}]  #S }}"
set -ga status-right "#[bg=default,fg=#{@thm_overlay_0},none]│"
set -ga status-right "#[bg=default,fg=#{@thm_blue}] 󰭦 %Y-%m-%d 󰅐 %H:%M "

# ---------------------------------------------------
# QUARTO SPLIT
# ---------------------------------------------------
# Al cambiar de tab, si el window activo está marcado con @quarto_tile, coloca
# Ghostty en la mitad izquierda (el visor WebKit del preview se coloca solo en
# la derecha); en cualquier otro tab restaura Ghostty a pantalla completa. Sale
# de inmediato si no hay sesión de split activa (@quarto_active), así que en uso
# normal no tiene coste. Lo activa el comando :QuartoSplit de nvim.
set-hook -g after-select-window 'run-shell -b "~/.tmux/scripts/quarto-tile.sh"'

# Al ver/seleccionar una ventana, borra su flag de notificación "Claude terminó"
# (-ga para añadir al hook anterior sin sobrescribirlo).
set-hook -ga after-select-window 'set-option -uw @claude_done'

# ---------------------------------------------------
# INITIALIZATION
# ---------------------------------------------------
# Bootstrap tpm
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
